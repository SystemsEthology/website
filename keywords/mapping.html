<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Keyword Map</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    #header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    #participants { font-weight: 700; }
    /* 通常は何も表示しない（エラー時だけ出す） */
    #status { white-space: pre-wrap; color: #b00020; display: none; }
    svg { width: 100%; height: 78vh; border: 1px solid #ddd; border-radius: 10px; }
    .node text { pointer-events: none; }
  </style>
</head>
<body>
  <h2>Research Keyword Map</h2>

  <div id="header">
    <div id="participants">参加者数: -</div>
    <div id="status"></div>
  </div>

  <svg id="viz"></svg>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const DATA_URL = "./clustered_keywords.json";

    // クラスタ間を詰める（小さいほど詰まる）
    const CLUSTER_COMPACT = 0.72;
    const PADDING = 30;
    const COLLIDE_PAD = 2;

    const participantsEl = document.getElementById("participants");
    const statusEl = document.getElementById("status");
    const svg = document.getElementById("viz");

    function showError(msg) {
      statusEl.style.display = "block";
      statusEl.textContent = msg;
    }
    function clearError() {
      statusEl.style.display = "none";
      statusEl.textContent = "";
    }
    function setParticipants(n) {
      if (!Number.isInteger(n) || n < 0) throw new Error(`participant count invalid: ${n}`);
      participantsEl.textContent = `参加者数: ${n}`;
    }

    async function loadData() {
      const res = await fetch(DATA_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`JSON fetch error: ${res.status} ${res.statusText}`);
      const json = await res.json();

      if (!Number.isInteger(json.participantCount)) throw new Error("participantCount missing/invalid");
      if (!Array.isArray(json.keywords)) throw new Error("keywords missing/invalid");

      return json;
    }

    function compactAroundMean(items, factor) {
      const mx = d3.mean(items, d => d.x);
      const my = d3.mean(items, d => d.y);
      return items.map(d => ({
        ...d,
        x: mx + (d.x - mx) * factor,
        y: my + (d.y - my) * factor
      }));
    }

    function makeClusterColorMap(items) {
      // clusterId を安定した順序で並べて色を割り当て
      const ids = Array.from(new Set(items.map(d => d.clusterId ?? "c0"))).sort();
      const palette = d3.schemePastel1; // 9色（パステル）
      const map = new Map();
      ids.forEach((id, i) => map.set(id, palette[i % palette.length]));
      return map;
    }

    function draw(dataJson) {
      clearError();
      setParticipants(dataJson.participantCount);

      let items = dataJson.keywords;
      if (!items || items.length < 1) {
        svg.innerHTML = "";
        return;
      }

      // 座標圧縮（クラスタ間を詰める）
      items = compactAroundMean(items, CLUSTER_COMPACT);

      // 色割り当て
      const colorMap = makeClusterColorMap(items);

      const W = svg.clientWidth || 800;
      const H = svg.clientHeight || 600;
      svg.innerHTML = "";

      const root = d3.select(svg).attr("viewBox", `0 0 ${W} ${H}`);
      const g = root.append("g");

      root.call(
        d3.zoom()
          .scaleExtent([0.5, 8])
          .on("zoom", (event) => g.attr("transform", event.transform))
      );

      const xs = items.map(d => d.x);
      const ys = items.map(d => d.y);

      const xScale = d3.scaleLinear()
        .domain(d3.extent(xs))
        .range([PADDING, W - PADDING]);

      const yScale = d3.scaleLinear()
        .domain(d3.extent(ys))
        .range([H - PADDING, PADDING]);

      const counts = items.map(d => d.count);
      const rMinScale = d3.scaleSqrt()
        .domain(d3.extent(counts))
        .range([10, 26]);

      const nodes = items.map(d => {
        const cid = d.clusterId ?? "c0";
        return {
          keyword: d.keyword,
          count: d.count,
          clusterId: cid,
          x: xScale(d.x),
          y: yScale(d.y),
          r: rMinScale(d.count),
          fill: colorMap.get(cid) ?? "#eee"
        };
      });

      const node = g.selectAll(".node")
        .data(nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.x},${d.y})`);

      node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", d => d.fill)
        .attr("stroke", "black")
        .attr("stroke-width", 1.0);

      node.append("title")
        .text(d => `${d.keyword} (n=${d.count})`);

      node.append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("font-size", d => (d.keyword.length >= 18 ? 10 : 12))
        .text(d => d.keyword);

      // 文字はみ出し対策：BBoxで円半径を拡張
      const TEXT_PAD = 10;
      node.each(function(d) {
        const gSel = d3.select(this);
        const textNode = gSel.select("text").node();
        const circleSel = gSel.select("circle");
        if (!textNode) return;

        const bb = textNode.getBBox();
        const needed = Math.max(bb.width, bb.height) * 0.55 + TEXT_PAD;
        d.r = Math.max(d.r, needed);
        circleSel.attr("r", d.r);
      });

      // 衝突解消
      const sim = d3.forceSimulation(nodes)
        .force("x", d3.forceX(d => d.x).strength(0.18))
        .force("y", d3.forceY(d => d.y).strength(0.18))
        .force("collide", d3.forceCollide(d => d.r + COLLIDE_PAD))
        .stop();

      for (let i = 0; i < 240; i++) sim.tick();
      node.attr("transform", d => `translate(${d.x},${d.y})`);
    }

    async function main() {
      try {
        const json = await loadData();
        draw(json);
        window.addEventListener("resize", () => draw(json), { passive: true });
      } catch (e) {
        console.error(e);
        showError(e?.message ?? String(e));
      }
    }

    main();
  </script>
</body>
</html>
