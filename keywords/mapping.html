<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Keyword Map</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    #header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    #participants { font-weight: 700; }
    #status { white-space: pre-wrap; color: #b00020; display: none; }
    svg { width: 100%; height: 78vh; border: 1px solid #ddd; border-radius: 10px; }
    @media (max-width: 640px) {
      body { margin: 8px; }
      svg { height: 86vh; }
    }
    .node { cursor: default; }
    .node text { pointer-events: none; }
  </style>
</head>
<body>
  <h2>Research Keyword Map</h2>

  <div id="header">
    <div id="participants">参加者数: -</div>
    <div id="status"></div>
  </div>

  <svg id="viz"></svg>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    // ★JSON
    const DATA_URL = "./clustered_keywords.json";

    // ===== レイアウト調整（デスクトップ/スマホで自動切替）=====
    // 「スマホでぎゅっと詰まりすぎる」対策：
    // - スマホ時は (1) クラスター縮小を弱める (=広げる) (2) 重なり許容を減らす (3) 多少縦長にする
    // - さらに、"必ず全部入れる" 自動フィットで過度に縮小されるのを避けるため、最小倍率をクランプ
    const BASE_CLUSTER_COMPACT = 0.3;  // 小さいほど詰まる
    const BASE_WORLD_SCALE     = 0.6;  // 小さいほど詰まる
    const BASE_OVERLAP_FACTOR  = 0.7;  // <1 で重なってOK
    const BASE_FIT_PAD         = 2;
    const BASE_TARGET_STRENGTH = 0.5; // 大きいほど x,y に忠実

    // 余白（px）
    const PADDING = 2;

    // ノード文字サイズと円サイズを独立管理
    const NODE_FONT_SIZE = 20;
    const FIXED_NODE_RADIUS = 48;

    // クラスター間だけを詰めるための設定
    // クラスター内の相対配置は維持し、クラスター全体を剛体として移動する。
    // 配置順はキーワード数の多い順に 上・下・左・右。
    const CLASS_PACK_GAP_PX = 6;

    // ホバー
    const HOVER_SCALE = 1.14;
    const HOVER_RISE_PX = 6;

    function getLayoutParams(W, H) {
      const isMobile = W <= 640;

      // スマホは「詰まり」を解消したいので、広がる方向へ寄せる
      const clusterCompact = isMobile ? 0.8 : BASE_CLUSTER_COMPACT;  // ↑で広がる
      const worldScale     = isMobile ? 0.6 : BASE_WORLD_SCALE;      // ↑で広がる

      // 重なり許容を減らす（=より強く衝突回避）
      const overlapFactor  = isMobile ? 0.8 : BASE_OVERLAP_FACTOR;

      // fit余白はスマホで少し大きめ（タップ余地にもなる）
      const fitPad         = isMobile ? 10 : BASE_FIT_PAD;

      // 目標座標へ戻す力：スマホで少し強めて距離構造を保ちやすく
      const targetStrength = isMobile ? 0.3 : BASE_TARGET_STRENGTH;

      // スマホで縦長に引き離す（横は少し抑える）
      const stretchX       = isMobile ? 0.95 : 1.0;
      const stretchY       = isMobile ? 2.5 : 1.0;

      // 自動フィットが「縮小しすぎ」にならないよう、最小倍率を設定（0 ならクランプなし）
      // スマホは「全員集合」を諦めて、多少はみ出してもOK（ピンチ・パンで見られる）
      const fitMinScaleClamp = isMobile ? 0.4 : 0.0;

      return {
        isMobile,
        clusterCompact,
        worldScale,
        overlapFactor,
        fitPad,
        targetStrength,
        stretchX,
        stretchY,
        fitMinScaleClamp
      };
    }
    // ===========================================================

    const participantsEl = document.getElementById("participants");
    const statusEl = document.getElementById("status");
    const svg = document.getElementById("viz");

    function showError(msg) {
      statusEl.style.display = "block";
      statusEl.textContent = msg;
    }
    function clearError() {
      statusEl.style.display = "none";
      statusEl.textContent = "";
    }
    function setParticipants(n) {
      if (!Number.isInteger(n) || n < 0) throw new Error(`participant count invalid: ${n}`);
      participantsEl.textContent = `参加者数: ${n}`;
    }

    async function loadData() {
      const res = await fetch(DATA_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`JSON fetch error: ${res.status} ${res.statusText}`);
      const json = await res.json();
      if (!Number.isInteger(json.participantCount)) throw new Error("participantCount missing/invalid");
      if (!Array.isArray(json.keywords)) throw new Error("keywords missing/invalid");
      return json;
    }

    function compactAroundMean(items, factor) {
      const mx = d3.mean(items, d => d.x);
      const my = d3.mean(items, d => d.y);
      return items.map(d => ({
        ...d,
        x: mx + (d.x - mx) * factor,
        y: my + (d.y - my) * factor
      }));
    }

    function makeClusterColorMap(items) {
      const ids = Array.from(new Set(items.map(d => d.clusterId ?? 0))).sort((a,b)=>a-b);
      const palette = d3.schemePastel1; // パステル
      const map = new Map();
      ids.forEach((id, i) => map.set(id, palette[i % palette.length]));
      return map;
    }

    // 各クラスターをPCAで主軸を求め、全体重心への放射方向に対して
    // 接線方向（タンジェント）に揃うよう回転させる。
    // これにより左右クラスターは縦長、上下クラスターは横長になり、
    // 全体が横長長方形にまとまる。
    function rotateClustersTangentially(items) {
      const clusters = d3.group(items, d => d.clusterId ?? 0);
      const cx = d3.mean(items, d => d.x);
      const cy = d3.mean(items, d => d.y);
      const result = [];

      for (const [, pts] of clusters) {
        const mcx = d3.mean(pts, d => d.x);
        const mcy = d3.mean(pts, d => d.y);

        // クラスター内の共分散行列から主軸の角度を算出
        let sxx = 0, syy = 0, sxy = 0;
        for (const p of pts) {
          const dx = p.x - mcx, dy = p.y - mcy;
          sxx += dx * dx; syy += dy * dy; sxy += dx * dy;
        }
        const currentAngle = 0.5 * Math.atan2(2 * sxy, sxx - syy);

        // 目標：全体重心からこのクラスター重心への方向（放射方向）に対して90°（接線方向）
        const radialAngle = Math.atan2(mcy - cy, mcx - cx);
        const targetAngle = radialAngle + Math.PI / 2;

        // 最小回転角（±90°以内に正規化）
        let rotAngle = targetAngle - currentAngle;
        while (rotAngle >  Math.PI / 2) rotAngle -= Math.PI;
        while (rotAngle < -Math.PI / 2) rotAngle += Math.PI;

        const cos = Math.cos(rotAngle), sin = Math.sin(rotAngle);
        for (const p of pts) {
          const dx = p.x - mcx, dy = p.y - mcy;
          result.push({
            ...p,
            x: mcx + dx * cos - dy * sin,
            y: mcy + dx * sin + dy * cos
          });
        }
      }
      return result;
    }


    function clusterBBox(nodes) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const d of nodes) {
        minX = Math.min(minX, d.x - d.r);
        maxX = Math.max(maxX, d.x + d.r);
        minY = Math.min(minY, d.y - d.r);
        maxY = Math.max(maxY, d.y + d.r);
      }
      return {
        minX, minY, maxX, maxY,
        w: maxX - minX,
        h: maxY - minY,
        cx: (minX + maxX) / 2,
        cy: (minY + maxY) / 2
      };
    }

    function rectsOverlap(a, b, gap = 0) {
      return !(
        a.maxX + gap <= b.minX ||
        b.maxX + gap <= a.minX ||
        a.maxY + gap <= b.minY ||
        b.maxY + gap <= a.minY
      );
    }

    function translatedRect(block, cx, cy) {
      return {
        minX: cx - block.w / 2,
        maxX: cx + block.w / 2,
        minY: cy - block.h / 2,
        maxY: cy + block.h / 2,
        w: block.w,
        h: block.h,
        cx,
        cy
      };
    }

    function moveClusterRigidly(nodes, block, targetCx, targetCy) {
      const dx = targetCx - block.cx;
      const dy = targetCy - block.cy;
      for (const d of nodes) {
        d.x += dx;
        d.y += dy;
      }
      block.cx = targetCx;
      block.cy = targetCy;
      block.minX += dx;
      block.maxX += dx;
      block.minY += dy;
      block.maxY += dy;
    }

    // クラスター内の密度・相対位置を変えず、クラスター単位で密に詰める。
    // ルール:
    // 1) キーワード数の多い順に、上・下・左・右へ割り当てる
    // 2) 上下クラスターは中心Xを揃えて縦積みする
    // 3) 左右クラスターは中央2クラスター双方との接触量が最大になる候補を採用する
    function packClusterBlocks(nodes, gapPx) {
      const groups = Array.from(d3.group(nodes, d => d.clusterId ?? 0), ([clusterId, pts]) => ({
        clusterId,
        pts,
        nKeywords: pts.length,
        totalMentions: d3.sum(pts, d => d.count ?? 1),
        box: clusterBBox(pts)
      }));
      if (groups.length < 2) return nodes;

      // 最大キーワード数順。タイブレークは totalMentions → clusterId。
      const ordered = [...groups].sort((a, b) =>
        d3.descending(a.nKeywords, b.nKeywords) ||
        d3.descending(a.totalMentions, b.totalMentions) ||
        d3.ascending(a.clusterId, b.clusterId)
      );

      const top = ordered[0];
      const bottom = ordered[1];
      const left = ordered[2];
      const right = ordered[3];

      // 上・下を中央に縦積みする。
      const totalCenterH = top.box.h + gapPx + bottom.box.h;
      const topCy = -totalCenterH / 2 + top.box.h / 2;
      const bottomCy = -totalCenterH / 2 + top.box.h + gapPx + bottom.box.h / 2;
      moveClusterRigidly(top.pts, top.box, 0, topCy);
      moveClusterRigidly(bottom.pts, bottom.box, 0, bottomCy);

      const centerRects = [top.box, bottom.box];

      function verticalOverlap(a, b) {
        return Math.max(0, Math.min(a.maxY, b.maxY) - Math.max(a.minY, b.minY));
      }

      function horizontalGapToTouch(rect, target, side) {
        return side < 0
          ? Math.abs(rect.maxX + gapPx - target.minX)
          : Math.abs(rect.minX - gapPx - target.maxX);
      }

      function totalContactScore(rect, side) {
        // 水平方向で接している中央矩形ほど、縦方向の重なりを接触量として強く評価する。
        // 「どちらか一方だけに接する」より「中央2矩形の両方に近く、かつ重なる」候補を優先する。
        let weightedContact = 0;
        let rawContact = 0;
        let nearestGap = Infinity;
        for (const target of centerRects) {
          const overlap = verticalOverlap(rect, target);
          const gap = horizontalGapToTouch(rect, target, side);
          nearestGap = Math.min(nearestGap, gap);
          rawContact += overlap;
          weightedContact += overlap / (1 + gap * 0.035);
        }
        return { weightedContact, rawContact, nearestGap };
      }

      function unionBBox(rects) {
        return {
          minX: d3.min(rects, d => d.minX),
          maxX: d3.max(rects, d => d.maxX),
          minY: d3.min(rects, d => d.minY),
          maxY: d3.max(rects, d => d.maxY)
        };
      }

      function combinedArea(rects) {
        const b = unionBBox(rects);
        return (b.maxX - b.minX) * (b.maxY - b.minY);
      }

      function sideCandidates(group, side) {
        if (!group) return [];

        const cands = [];
        const union = unionBBox(centerRects);

        // x候補: 上・下それぞれの外接矩形に接する位置 + 中央2矩形の外側端に接する位置。
        const xCenters = [];
        for (const target of centerRects) {
          xCenters.push(side < 0
            ? target.minX - gapPx - group.box.w / 2
            : target.maxX + gapPx + group.box.w / 2
          );
        }
        xCenters.push(side < 0
          ? union.minX - gapPx - group.box.w / 2
          : union.maxX + gapPx + group.box.w / 2
        );

        // y候補: 上下それぞれの中心・辺合わせ・全体中心。
        const yCenters = [0];
        for (const target of centerRects) {
          yCenters.push(target.cy);
          yCenters.push(target.minY + group.box.h / 2);
          yCenters.push(target.maxY - group.box.h / 2);
        }
        yCenters.push(union.minY + group.box.h / 2);
        yCenters.push(union.maxY - group.box.h / 2);
        yCenters.push((union.minY + union.maxY) / 2);

        for (const cx of Array.from(new Set(xCenters.map(v => Math.round(v * 1000) / 1000)))) {
          for (const cy of Array.from(new Set(yCenters.map(v => Math.round(v * 1000) / 1000)))) {
            const rect = translatedRect(group.box, cx, cy);
            const contact = totalContactScore(rect, side);
            cands.push({ group, side, rect, contact });
          }
        }
        return cands;
      }

      const leftCandidates = sideCandidates(left, -1);
      const rightCandidates = sideCandidates(right, 1);
      let best = null;

      function overlapsAny(rect, rects, gap = 0) {
        return rects.some(r => rectsOverlap(rect, r, gap));
      }

      function evaluate(choices) {
        const sideRects = choices.map(c => c.rect);
        for (const rect of sideRects) {
          if (overlapsAny(rect, centerRects, 0)) return null;
        }
        if (sideRects.length === 2 && rectsOverlap(sideRects[0], sideRects[1], gapPx)) return null;

        const allRects = [...centerRects, ...sideRects];
        const area = combinedArea(allRects);
        const centerPull = sideRects.reduce((acc, r) => acc + Math.hypot(r.cx, r.cy), 0);
        const contact = choices.reduce((acc, c) => acc + c.contact.weightedContact, 0);
        const rawContact = choices.reduce((acc, c) => acc + c.contact.rawContact, 0);
        const nearestGap = choices.reduce((acc, c) => acc + c.contact.nearestGap, 0);

        // 接触量を最優先。次に外接面積、中心寄せ、実際の水平ギャップ。
        const score = -contact * 100000 - rawContact * 1000 + area * 0.35 + centerPull * 5 + nearestGap * 40;
        return { score, choices };
      }

      if (leftCandidates.length && rightCandidates.length) {
        for (const lc of leftCandidates) {
          for (const rc of rightCandidates) {
            const ev = evaluate([lc, rc]);
            if (!ev) continue;
            if (!best || ev.score < best.score) best = ev;
          }
        }
      } else {
        for (const c of [...leftCandidates, ...rightCandidates]) {
          const ev = evaluate([c]);
          if (!ev) continue;
          if (!best || ev.score < best.score) best = ev;
        }
      }

      // 完全非重複候補がない場合の安全策。
      if (!best) {
        const fallback = [];
        if (leftCandidates.length) {
          fallback.push([...leftCandidates].sort((a, b) =>
            b.contact.weightedContact - a.contact.weightedContact ||
            Math.hypot(a.rect.cx, a.rect.cy) - Math.hypot(b.rect.cx, b.rect.cy)
          )[0]);
        }
        if (rightCandidates.length) {
          fallback.push([...rightCandidates].sort((a, b) =>
            b.contact.weightedContact - a.contact.weightedContact ||
            Math.hypot(a.rect.cx, a.rect.cy) - Math.hypot(b.rect.cx, b.rect.cy)
          )[0]);
        }
        best = { score: Infinity, choices: fallback };
      }

      for (const choice of best.choices) {
        moveClusterRigidly(choice.group.pts, choice.group.box, choice.rect.cx, choice.rect.cy);
      }
      return nodes;
    }

    function fitToView(root, zoom, nodes, W, H, fitPad, minScaleClamp) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const d of nodes) {
        minX = Math.min(minX, d.x - d.r);
        maxX = Math.max(maxX, d.x + d.r);
        minY = Math.min(minY, d.y - d.r);
        maxY = Math.max(maxY, d.y + d.r);
      }
      if (!Number.isFinite(minX) || !Number.isFinite(minY) || !Number.isFinite(maxX) || !Number.isFinite(maxY)) return;

      const bw = (maxX - minX) + fitPad * 2;
      const bh = (maxY - minY) + fitPad * 2;
      if (!(bw > 0) || !(bh > 0)) return;

      let s = Math.min(W / bw, H / bh);
      if (minScaleClamp && Number.isFinite(minScaleClamp)) s = Math.max(s, minScaleClamp);

      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;

      const t = d3.zoomIdentity
        .translate(W / 2, H / 2)
        .scale(s)
        .translate(-cx, -cy);

      root.call(zoom.transform, t);
    }

    function draw(dataJson) {
      clearError();
      setParticipants(dataJson.participantCount);

      let items = dataJson.keywords;
      if (!items || items.length < 1) {
        svg.innerHTML = "";
        return;
      }

      const W = svg.clientWidth || 800;
      const H = svg.clientHeight || 600;
      const lp = getLayoutParams(W, H);

      // クラスターごとにPCA回転して全体を横長にまとめる
      items = rotateClustersTangentially(items);

      // スマホ時は広がる方向へ
      items = compactAroundMean(items, lp.clusterCompact);

      const colorMap = makeClusterColorMap(items);

      svg.innerHTML = "";

      const root = d3.select(svg).attr("viewBox", `0 0 ${W} ${H}`);
      const g = root.append("g");

      const zoom = d3.zoom()
        .scaleExtent([0.2, 12])
        .on("zoom", (event) => g.attr("transform", event.transform));
      root.call(zoom);

      // fixed “world” mapping：extentで引き伸ばさない
      const xs = items.map(d => d.x);
      const ys = items.map(d => d.y);
      const mx = d3.mean(xs);
      const my = d3.mean(ys);

      const dx = d3.max(xs.map(x => Math.abs(x - mx))) || 1;
      const dy = d3.max(ys.map(y => Math.abs(y - my))) || 1;

      // WORLD_SCALE +（スマホ時は縦長ストレッチ）
      const xToScreen = (x) => (W / 2) + (x - mx) * ((W - 2 * PADDING) * lp.worldScale * lp.stretchX) / (2 * dx);
      const yToScreen = (y) => (H / 2) - (y - my) * ((H - 2 * PADDING) * lp.worldScale * lp.stretchY) / (2 * dy);

      const nodes = items.map(d => {
        const cid = (d.clusterId ?? 0);
        return {
          keyword: d.keyword,
          count: d.count ?? 1,
          clusterId: cid,
          x: xToScreen(d.x),
          y: yToScreen(d.y),
          r: FIXED_NODE_RADIUS,
          fill: colorMap.get(cid) ?? "#eee"
        };
      });

      // まず既存のノード衝突回避でクラス内の見え方を確定し、その後クラスター単位で剛体配置する。
      const collideR = FIXED_NODE_RADIUS * lp.overlapFactor;
      const sim = d3.forceSimulation(nodes)
        .force("x", d3.forceX(d => d.x).strength(lp.targetStrength))
        .force("y", d3.forceY(d => d.y).strength(lp.targetStrength))
        .force("collide", d3.forceCollide(collideR))
        .stop();
      for (let i = 0; i < 320; i++) sim.tick();

      // クラスター単位で剛体移動し、クラスター間だけを密に詰める。
      packClusterBlocks(nodes, CLASS_PACK_GAP_PX);

      const node = g.selectAll(".node")
        .data(nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.x},${d.y})`);

      node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", d => d.fill)
        .attr("stroke", "black")
        .attr("stroke-width", 1.0);

      node.append("title").text(d => d.keyword);

      node.append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("font-size", NODE_FONT_SIZE)
        .text(d => d.keyword);

      // 円サイズは文字サイズから独立させる
      nodes.forEach(d => d.r = FIXED_NODE_RADIUS);
      node.select("circle").attr("r", FIXED_NODE_RADIUS);

      // ホバー
      node.on("mouseenter", function(event, d) {
          d3.select(this).raise()
            .transition().duration(90)
            .attr("transform", `translate(${d.x},${d.y - HOVER_RISE_PX}) scale(${HOVER_SCALE})`);
        })
        .on("mouseleave", function(event, d) {
          d3.select(this)
            .transition().duration(90)
            .attr("transform", `translate(${d.x},${d.y}) scale(1)`);
        });

      // 初期倍率：スマホでは縮小しすぎを止める（多少はみ出しOK）
      fitToView(root, zoom, nodes, W, H, lp.fitPad, lp.fitMinScaleClamp);
    }

    async function main() {
      try {
        const json = await loadData();
        draw(json);
        window.addEventListener("resize", () => draw(json), { passive: true });
      } catch (e) {
        console.error(e);
        showError(e?.message ?? String(e));
      }
    }

    main();
  </script>
</body>
</html>
