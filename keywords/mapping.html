<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Keyword Map</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    #header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    #participants { font-weight: 700; }
    #status { white-space: pre-wrap; color: #b00020; display: none; }
    svg { width: 100%; height: 78vh; border: 1px solid #ddd; border-radius: 10px; }
    .node { cursor: default; }
    .node text { pointer-events: none; }
  </style>
</head>
<body>
  <h2>Research Keyword Map</h2>

  <div id="header">
    <div id="participants">参加者数: -</div>
    <div id="status"></div>
  </div>

  <svg id="viz"></svg>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    // ★JSON
    const DATA_URL = "./clustered_keywords.json";

    // ===== 近づける系 =====
    // カテゴリは分かるが離れすぎない：小さいほど詰まる（※今度はちゃんと効く）
    const CLUSTER_COMPACT = 0.4; // 0.2〜0.8で調整

    // ★これが「見た目の詰まり」を決める主ツマミ（小さいほど詰まる）
    // extentで引き伸ばさないので、距離構造がそのまま反映される
    const WORLD_SCALE = 0.7;
    // ======================

    // 余白（px）
    const PADDING = 2;

    // 最大文字に合わせて全円同一半径：文字周り余白
    const TEXT_PAD = 2;

    // 円同士の重なり許容（<1 で重なってOK）
    const OVERLAP_FACTOR = 0.7;

    // 自動フィット余白（px）
    const FIT_PAD = 2;

    // ホバー
    const HOVER_SCALE = 1.14;
    const HOVER_RISE_PX = 6;

    // 距離構造をどれだけ守るか（大きいほど x,y に忠実）
    const TARGET_STRENGTH = 0.28; // 0.18〜0.45

    // ★フォントサイズ（px）— 円の半径とは独立して動作
    const FONT_SIZE = 20;
    // ★円の半径（px）— null でテキストに自動フィット、数値で固定（フォントと独立）
    const NODE_RADIUS = null;

    // クラスター配置オフセット（画面サイズに対する比率）
    const VERT_OFFSET = 0.22;   // 上・下クラスター中心の縦オフセット
    const HORIZ_OFFSET = 0.28;  // 左・右クラスター中心の横オフセット

    const participantsEl = document.getElementById("participants");
    const statusEl = document.getElementById("status");
    const svg = document.getElementById("viz");

    function showError(msg) {
      statusEl.style.display = "block";
      statusEl.textContent = msg;
    }
    function clearError() {
      statusEl.style.display = "none";
      statusEl.textContent = "";
    }
    function setParticipants(n) {
      if (!Number.isInteger(n) || n < 0) throw new Error(`participant count invalid: ${n}`);
      participantsEl.textContent = `参加者数: ${n}`;
    }

    async function loadData() {
      const res = await fetch(DATA_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`JSON fetch error: ${res.status} ${res.statusText}`);
      const json = await res.json();
      if (!Number.isInteger(json.participantCount)) throw new Error("participantCount missing/invalid");
      if (!Array.isArray(json.keywords)) throw new Error("keywords missing/invalid");
      return json;
    }

    function compactAroundMean(items, factor) {
      const mx = d3.mean(items, d => d.x);
      const my = d3.mean(items, d => d.y);
      return items.map(d => ({
        ...d,
        x: mx + (d.x - mx) * factor,
        y: my + (d.y - my) * factor
      }));
    }

    function makeClusterColorMap(items) {
      const ids = Array.from(new Set(items.map(d => d.clusterId ?? 0))).sort((a,b)=>a-b);
      const palette = d3.schemePastel1; // パステル
      const map = new Map();
      ids.forEach((id, i) => map.set(id, palette[i % palette.length]));
      return map;
    }

    function fitToView(root, zoom, nodes, W, H) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const d of nodes) {
        minX = Math.min(minX, d.x - d.r);
        maxX = Math.max(maxX, d.x + d.r);
        minY = Math.min(minY, d.y - d.r);
        maxY = Math.max(maxY, d.y + d.r);
      }
      if (!Number.isFinite(minX) || !Number.isFinite(minY) || !Number.isFinite(maxX) || !Number.isFinite(maxY)) return;

      const bw = (maxX - minX) + FIT_PAD * 2;
      const bh = (maxY - minY) + FIT_PAD * 2;
      if (!(bw > 0) || !(bh > 0)) return;

      const s = Math.min(W / bw, H / bh);
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;

      const t = d3.zoomIdentity
        .translate(W / 2, H / 2)
        .scale(s)
        .translate(-cx, -cy);

      root.call(zoom.transform, t);
    }

    function draw(dataJson) {
      clearError();
      setParticipants(dataJson.participantCount);

      let items = dataJson.keywords;
      if (!items || items.length < 1) {
        svg.innerHTML = "";
        return;
      }

      // CLUSTER_COMPACT が “見た目に効く” ようになった
      items = compactAroundMean(items, CLUSTER_COMPACT);

      const colorMap = makeClusterColorMap(items);

      const W = svg.clientWidth || 800;
      const H = svg.clientHeight || 600;
      svg.innerHTML = "";

      const root = d3.select(svg).attr("viewBox", `0 0 ${W} ${H}`);
      const g = root.append("g");

      const zoom = d3.zoom()
        .scaleExtent([0.2, 12])
        .on("zoom", (event) => g.attr("transform", event.transform));
      root.call(zoom);

      // ★ fixed “world” mapping：extentで引き伸ばさない
      const xs = items.map(d => d.x);
      const ys = items.map(d => d.y);
      const mx = d3.mean(xs);
      const my = d3.mean(ys);

      const dx = d3.max(xs.map(x => Math.abs(x - mx))) || 1;
      const dy = d3.max(ys.map(y => Math.abs(y - my))) || 1;

      // WORLD_SCALE を使って中心に描画（PADDING は画面端ガード）
      const xToScreen = (x) => (W / 2) + (x - mx) * ((W - 2 * PADDING) * WORLD_SCALE) / (2 * dx);
      const yToScreen = (y) => (H / 2) - (y - my) * ((H - 2 * PADDING) * WORLD_SCALE) / (2 * dy);

      const nodes = items.map(d => {
        const cid = (d.clusterId ?? 0);
        return {
          keyword: d.keyword,
          count: d.count ?? 1,
          clusterId: cid,
          x: xToScreen(d.x),
          y: yToScreen(d.y),
          r: 10,
          fill: colorMap.get(cid) ?? "#eee"
        };
      });

      // === クラスター配置：キーワード数順で上・下・左・右に割り当て ===
      {
        // クラスターごとの重心とキーワード数を集計
        const cStats = new Map();
        for (const nd of nodes) {
          const cid = nd.clusterId;
          if (!cStats.has(cid)) cStats.set(cid, { count: 0, sumX: 0, sumY: 0 });
          const s = cStats.get(cid);
          s.count++;
          s.sumX += nd.x;
          s.sumY += nd.y;
        }
        for (const s of cStats.values()) {
          s.cx = s.sumX / s.count;
          s.cy = s.sumY / s.count;
        }

        // キーワード数降順でソート → 1位=上、2位=下、3位=左、4位=右
        const sortedCids = Array.from(cStats.entries())
          .sort((a, b) => b[1].count - a[1].count)
          .map(([cid]) => cid);
        const ROLES = ['top', 'bottom', 'left', 'right'];
        const cidRole = new Map(sortedCids.map((cid, i) => [cid, ROLES[i] ?? 'other']));

        // 上下を中央付近に近接配置、左右を上下の中間高さに配置
        const vOff = H * VERT_OFFSET;
        const hOff = W * HORIZ_OFFSET;
        const roleCentroid = {
          top:    { x: W / 2,        y: H / 2 - vOff },
          bottom: { x: W / 2,        y: H / 2 + vOff },
          left:   { x: W / 2 - hOff, y: H / 2 },
          right:  { x: W / 2 + hOff, y: H / 2 },
          other:  { x: W / 2,        y: H / 2 }
        };

        // クラスター内部の相対位置を保持しながら重心を目標位置へ移動
        for (const nd of nodes) {
          const s = cStats.get(nd.clusterId);
          const tc = roleCentroid[cidRole.get(nd.clusterId) ?? 'other'];
          nd.x = tc.x + (nd.x - s.cx);
          nd.y = tc.y + (nd.y - s.cy);
        }
      }

      const node = g.selectAll(".node")
        .data(nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.x},${d.y})`);

      node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", d => d.fill)
        .attr("stroke", "black")
        .attr("stroke-width", 1.0);

      node.append("title").text(d => d.keyword);

      node.append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("font-size", FONT_SIZE)
        .text(d => d.keyword);

      // 最大文字に合わせて全円同一半径
      let maxNeededR = 0;
      node.each(function() {
        const t = d3.select(this).select("text").node();
        if (!t) return;
        const bb = t.getBBox();
        const needed = Math.max(bb.width, bb.height) * 0.55 + TEXT_PAD;
        if (needed > maxNeededR) maxNeededR = needed;
      });
      if (!(maxNeededR > 0)) throw new Error("text bbox measurement failed (maxNeededR invalid)");

      // NODE_RADIUS が設定されていれば固定値、null なら自動フィット（フォントと独立）
      const nodeR = (NODE_RADIUS !== null && NODE_RADIUS > 0) ? NODE_RADIUS : maxNeededR;
      nodes.forEach(d => d.r = nodeR);
      node.select("circle").attr("r", nodeR);

      // 重なりOK（衝突半径を縮める）
      const collideR = nodeR * OVERLAP_FACTOR;

      // x,y へ戻す力を強めると「距離構造」が効く
      const sim = d3.forceSimulation(nodes)
        .force("x", d3.forceX(d => d.x).strength(TARGET_STRENGTH))
        .force("y", d3.forceY(d => d.y).strength(TARGET_STRENGTH))
        .force("collide", d3.forceCollide(collideR))
        .stop();

      for (let i = 0; i < 320; i++) sim.tick();
      node.attr("transform", d => `translate(${d.x},${d.y})`);

      // ホバー
      node.on("mouseenter", function(event, d) {
          d3.select(this).raise()
            .transition().duration(90)
            .attr("transform", `translate(${d.x},${d.y - HOVER_RISE_PX}) scale(${HOVER_SCALE})`);
        })
        .on("mouseleave", function(event, d) {
          d3.select(this)
            .transition().duration(90)
            .attr("transform", `translate(${d.x},${d.y}) scale(1)`);
        });

      // 初期倍率で必ず入りきる
      fitToView(root, zoom, nodes, W, H);
    }

    async function main() {
      try {
        const json = await loadData();
        draw(json);
        window.addEventListener("resize", () => draw(json), { passive: true });
      } catch (e) {
        console.error(e);
        showError(e?.message ?? String(e));
      }
    }

    main();
  </script>
</body>
</html>
