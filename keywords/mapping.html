<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Keyword Map</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
    #header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    #participants { font-weight: 700; }
    #status { white-space: pre-wrap; color: #b00020; display: none; }
    svg { width: 100%; height: 78vh; border: 1px solid #ddd; border-radius: 10px; }
    .node text { pointer-events: none; }
  </style>
</head>
<body>
  <h2>Research Keyword Map</h2>

  <div id="header">
    <div id="participants">参加者数: -</div>
    <div id="status"></div>
  </div>

  <svg id="viz"></svg>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const DATA_URL = "./clustered_keywords.json";

    // ===== 詰め具合（小さいほど詰まる） =====
    const CLUSTER_COMPACT = 0.42;  // 0.35〜0.55あたりが実用
    const PADDING = 10;           // 余白ほぼゼロ
    // ======================================

    // ===== 楕円サイズ（全ノード統一） =====
    const TEXT_PAD_X = 16;        // 文字の左右余白
    const TEXT_PAD_Y = 10;        // 文字の上下余白
    const ELLIPSE_STRETCH_X = 1.25; // 横長にする倍率（rxを太らせる）
    // ======================================

    // 衝突（すき間）
    const COLLIDE_PAD = 2;

    const participantsEl = document.getElementById("participants");
    const statusEl = document.getElementById("status");
    const svg = document.getElementById("viz");

    function showError(msg) {
      statusEl.style.display = "block";
      statusEl.textContent = msg;
    }
    function clearError() {
      statusEl.style.display = "none";
      statusEl.textContent = "";
    }
    function setParticipants(n) {
      if (!Number.isInteger(n) || n < 0) throw new Error(`participant count invalid: ${n}`);
      participantsEl.textContent = `参加者数: ${n}`;
    }

    async function loadData() {
      const res = await fetch(DATA_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`JSON fetch error: ${res.status} ${res.statusText}`);
      const json = await res.json();
      if (!Number.isInteger(json.participantCount)) throw new Error("participantCount missing/invalid");
      if (!Array.isArray(json.keywords)) throw new Error("keywords missing/invalid");
      return json;
    }

    function compactAroundMean(items, factor) {
      const mx = d3.mean(items, d => d.x);
      const my = d3.mean(items, d => d.y);
      return items.map(d => ({
        ...d,
        x: mx + (d.x - mx) * factor,
        y: my + (d.y - my) * factor
      }));
    }

    function makeClusterColorMap(items) {
      const ids = Array.from(new Set(items.map(d => d.clusterId ?? "c0"))).sort();
      const palette = d3.schemePastel1; // 9色（循環）
      const map = new Map();
      ids.forEach((id, i) => map.set(id, palette[i % palette.length]));
      return map;
    }

    function draw(dataJson) {
      clearError();
      setParticipants(dataJson.participantCount);

      let items = dataJson.keywords;
      if (!items || items.length < 1) {
        svg.innerHTML = "";
        return;
      }

      // 1) 座標を強く圧縮して「カテゴリ間の空白」を潰す
      items = compactAroundMean(items, CLUSTER_COMPACT);

      // 2) 色割り当て（クラスタごと）
      const colorMap = makeClusterColorMap(items);

      const W = svg.clientWidth || 800;
      const H = svg.clientHeight || 600;
      svg.innerHTML = "";

      const root = d3.select(svg).attr("viewBox", `0 0 ${W} ${H}`);
      const g = root.append("g");

      root.call(
        d3.zoom()
          .scaleExtent([0.5, 8])
          .on("zoom", (event) => g.attr("transform", event.transform))
      );

      const xs = items.map(d => d.x);
      const ys = items.map(d => d.y);

      const xScale = d3.scaleLinear()
        .domain(d3.extent(xs))
        .range([PADDING, W - PADDING]);

      const yScale = d3.scaleLinear()
        .domain(d3.extent(ys))
        .range([H - PADDING, PADDING]);

      const nodes = items.map(d => {
        const cid = d.clusterId ?? "c0";
        return {
          keyword: d.keyword,
          count: d.count,
          clusterId: cid,
          x: xScale(d.x),
          y: yScale(d.y),
          fill: colorMap.get(cid) ?? "#eee",
          // 楕円半径は後で「最大文字」に合わせて一括設定
          rx: 10,
          ry: 10
        };
      });

      const node = g.selectAll(".node")
        .data(nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.x},${d.y})`);

      // ★円ではなく楕円
      node.append("ellipse")
        .attr("cx", 0)
        .attr("cy", 0)
        .attr("rx", d => d.rx)
        .attr("ry", d => d.ry)
        .attr("fill", d => d.fill)
        .attr("stroke", "black")
        .attr("stroke-width", 1.0);

      node.append("title")
        .text(d => `${d.keyword} (n=${d.count})`);

      node.append("text")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("font-size", 12) // 全ノード統一（最大文字に合わせて枠を作るため）
        .text(d => d.keyword);

      // 3) まず「最大の文字BBox」を計測 → 全楕円を同一サイズに
      let maxW = 0;
      let maxH = 0;

      node.each(function() {
        const t = d3.select(this).select("text").node();
        if (!t) return;
        const bb = t.getBBox();
        if (bb.width > maxW) maxW = bb.width;
        if (bb.height > maxH) maxH = bb.height;
      });

      // 数値整合性チェック（空なら止める）
      if (!(maxW > 0) || !(maxH > 0)) {
        throw new Error("text bbox measurement failed (maxW/maxH invalid)");
      }

      // 楕円半径（rx, ry）
      const rx = ((maxW / 2) + TEXT_PAD_X) * ELLIPSE_STRETCH_X;
      const ry = (maxH / 2) + TEXT_PAD_Y;

      // 全ノードへ適用
      nodes.forEach(d => { d.rx = rx; d.ry = ry; });

      node.select("ellipse")
        .attr("rx", rx)
        .attr("ry", ry);

      // 4) さらに詰める：衝突＋中心へ寄せる
      // 楕円同士の衝突は厳密でなく「外接円」で近似（十分見た目が良い）
      const collideR = Math.max(rx, ry);

      const sim = d3.forceSimulation(nodes)
        .force("x", d3.forceX(W/2).strength(0.12))
        .force("y", d3.forceY(H/2).strength(0.12))
        .force("collide", d3.forceCollide(collideR + COLLIDE_PAD))
        .stop();

      for (let i = 0; i < 320; i++) sim.tick();
      node.attr("transform", d => `translate(${d.x},${d.y})`);
    }

    async function main() {
      try {
        const json = await loadData();
        draw(json);
        window.addEventListener("resize", () => draw(json), { passive: true });
      } catch (e) {
        console.error(e);
        showError(e?.message ?? String(e));
      }
    }

    main();
  </script>
</body>
</html>
