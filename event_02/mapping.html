<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Keyword Map</title>
  <style>
    body { margin: 0; }
    #status { white-space: pre-wrap; color: #b00020; display: none; }
    svg { width: 100%; height: 100vh; display: block; }
    .node { cursor: default; }
    .node text { pointer-events: none; }
  </style>
</head>
<body>
  <div id="status"></div>
  <svg id="viz"></svg>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    // ★JSON
    const DATA_URL = "./clustered_keywords.json";

    // ===== クラスター配置 =====
    const VERT_OFFSET      = 0.55; // 上・下クラスター重心の縦オフセット（画面Hの比率）
    const HORIZ_OFFSET     = 0.55; // 左・右クラスター重心の横オフセット（画面Wの比率）
    const WORLD_SCALE      = 1.0;  // クラスター内ノードの散らばり（小さいほど密集）
    const TARGET_STRENGTH  = 0.2; // 目標位置への引き付け力（0.18〜0.45）

    // ===== 円・フォント =====
    const FONT_SIZE        = 20;   // テキストフォントサイズ（px）
    const NODE_RADIUS      = 80;   // 表示円の半径（px）— null でテキスト自動フィット
    const LAYOUT_RADIUS    = 70;   // 衝突・配置半径（px）— フォントと独立
    const OVERLAP_FACTOR   = 0.8;  // 衝突半径の倍率（< 1 で重なり許容）

    // ===== ホバー =====
    const HOVER_SCALE      = 1.14;
    const HOVER_RISE_PX    = 6;

    const statusEl = document.getElementById("status");
    const svg = document.getElementById("viz");

    function showError(msg) {
      statusEl.style.display = "block";
      statusEl.textContent = msg;
    }
    function clearError() {
      statusEl.style.display = "none";
      statusEl.textContent = "";
    }

    async function loadData() {
      const res = await fetch(DATA_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`JSON fetch error: ${res.status} ${res.statusText}`);
      const json = await res.json();
      if (!Number.isInteger(json.participantCount)) throw new Error("participantCount missing/invalid");
      if (!Array.isArray(json.keywords)) throw new Error("keywords missing/invalid");
      return json;
    }

    function makeClusterColorMap(items) {
      const ids = Array.from(new Set(items.map(d => d.clusterId ?? 0))).sort((a,b)=>a-b);
      const palette = d3.schemePastel1; // パステル
      const map = new Map();
      ids.forEach((id, i) => map.set(id, palette[i % palette.length]));
      return map;
    }

    function fitToView(root, zoom, nodes, W, H) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const d of nodes) {
        minX = Math.min(minX, d.x - d.r);
        maxX = Math.max(maxX, d.x + d.r);
        minY = Math.min(minY, d.y - d.r);
        maxY = Math.max(maxY, d.y + d.r);
      }
      if (!Number.isFinite(minX) || !Number.isFinite(minY) || !Number.isFinite(maxX) || !Number.isFinite(maxY)) return;

      const bw = maxX - minX;
      const bh = maxY - minY;
      if (!(bw > 0) || !(bh > 0)) return;

      const INITIAL_ZOOM_FACTOR = 1.4; // 初期表示倍率（1.0=全体表示、2.0=2倍）
      const s = Math.min(W / bw, H / bh) * INITIAL_ZOOM_FACTOR;
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;

      const t = d3.zoomIdentity
        .translate(W / 2, H / 2)
        .scale(s)
        .translate(-cx, -cy);

      root.call(zoom.transform, t);
    }

    function draw(dataJson) {
      clearError();

      let items = dataJson.keywords;
      if (!items || items.length < 1) {
        svg.innerHTML = "";
        return;
      }

      const colorMap = makeClusterColorMap(items);

      const W = svg.clientWidth || 800;
      const H = svg.clientHeight || 600;
      svg.innerHTML = "";

      const root = d3.select(svg).attr("viewBox", `0 0 ${W} ${H}`);
      const g = root.append("g");

      const zoom = d3.zoom()
        .scaleExtent([0.2, 12])
        .filter(event => {
          // スクロールホイールによるズームはどこでも有効
          if (event.type === 'wheel') return true;
          // ドラッグ・タッチはノード要素上のみ有効（空白部分は無反応 / ページスクロール）
          return !!event.target.closest('.node');
        })
        .on("zoom", (event) => g.attr("transform", event.transform));
      root.call(zoom);
      // D3 が設定する touch-action:none を上書き → 空白タッチでページを縦スクロール可能に
      d3.select(svg).style("touch-action", "pan-y");

      const xs = items.map(d => d.x);
      const ys = items.map(d => d.y);
      const mx = d3.mean(xs);
      const my = d3.mean(ys);
      const dx = d3.max(xs.map(x => Math.abs(x - mx))) || 1;
      const dy = d3.max(ys.map(y => Math.abs(y - my))) || 1;

      // WORLD_SCALE でクラスター内の散らばりを制御
      const xToScreen = (x) => (W / 2) + (x - mx) * (W * WORLD_SCALE) / (2 * dx);
      const yToScreen = (y) => (H / 2) - (y - my) * (H * WORLD_SCALE) / (2 * dy);

      const nodes = items.map(d => {
        const cid = (d.clusterId ?? 0);
        return {
          keyword: d.keyword,
          count: d.count ?? 1,
          clusterId: cid,
          x: xToScreen(d.x),
          y: yToScreen(d.y),
          r: 10,
          fill: colorMap.get(cid) ?? "#eee"
        };
      });

      // === クラスター配置：キーワード数順で上・下・左・右に割り当て ===
      {
        // クラスターごとの重心とキーワード数を集計
        const cStats = new Map();
        for (const nd of nodes) {
          const cid = nd.clusterId;
          if (!cStats.has(cid)) cStats.set(cid, { count: 0, sumX: 0, sumY: 0 });
          const s = cStats.get(cid);
          s.count++;
          s.sumX += nd.x;
          s.sumY += nd.y;
        }
        for (const s of cStats.values()) {
          s.cx = s.sumX / s.count;
          s.cy = s.sumY / s.count;
        }

        // キーワード数降順でソート → 1位=上、2位=下、3位=左、4位=右
        const sortedCids = Array.from(cStats.entries())
          .sort((a, b) => b[1].count - a[1].count)
          .map(([cid]) => cid);
        const ROLES = ['top', 'bottom', 'left', 'right'];
        const cidRole = new Map(sortedCids.map((cid, i) => [cid, ROLES[i] ?? 'other']));

        // 上下を中央付近に近接配置、左右を上下の中間高さに配置
        const vOff = H * VERT_OFFSET;
        const hOff = W * HORIZ_OFFSET;
        const roleCentroid = {
          top:    { x: W / 2,        y: H / 2 - vOff },
          bottom: { x: W / 2,        y: H / 2 + vOff },
          left:   { x: W / 2 - hOff, y: H / 2 },
          right:  { x: W / 2 + hOff, y: H / 2 },
          other:  { x: W / 2,        y: H / 2 }
        };

        // クラスター内部の相対位置を保持しながら重心を目標位置へ移動
        for (const nd of nodes) {
          const s = cStats.get(nd.clusterId);
          const tc = roleCentroid[cidRole.get(nd.clusterId) ?? 'other'];
          nd.x = tc.x + (nd.x - s.cx);
          nd.y = tc.y + (nd.y - s.cy);
        }
      }

      const node = g.selectAll(".node")
        .data(nodes)
        .enter()
        .append("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.x},${d.y})`);

      node.append("circle")
        .attr("r", d => d.r)
        .attr("fill", d => d.fill)
        .attr("stroke", "black")
        .attr("stroke-width", 1.0);

      node.append("title").text(d => d.keyword);

      const WRAP_CHARS = 8; // 1行の最大文字数
      function wrapLines(str) {
        const lines = [];
        for (let i = 0; i < str.length; i += WRAP_CHARS) lines.push(str.slice(i, i + WRAP_CHARS));
        return lines;
      }

      node.append("text")
        .attr("text-anchor", "middle")
        .attr("font-size", FONT_SIZE)
        .each(function(d) {
          const lines = wrapLines(d.keyword);
          const lineH = FONT_SIZE * 1.2;
          const topY = -(lines.length - 1) / 2 * lineH;
          d3.select(this).selectAll("tspan")
            .data(lines)
            .enter()
            .append("tspan")
            .attr("x", 0)
            .attr("y", (_, i) => topY + i * lineH)
            .attr("dominant-baseline", "middle")
            .text(l => l);
        });

      // 最大文字に合わせて全円同一半径
      let maxNeededR = 0;
      node.each(function() {
        const t = d3.select(this).select("text").node();
        if (!t) return;
        const bb = t.getBBox();
        const needed = Math.max(bb.width, bb.height) * 0.55;
        if (needed > maxNeededR) maxNeededR = needed;
      });
      if (!(maxNeededR > 0)) throw new Error("text bbox measurement failed (maxNeededR invalid)");

      // 表示半径：NODE_RADIUS 固定 or テキスト自動フィット
      const nodeR = (NODE_RADIUS !== null && NODE_RADIUS > 0) ? NODE_RADIUS : maxNeededR;
      nodes.forEach(d => d.r = nodeR);
      node.select("circle").attr("r", nodeR);

      // 衝突半径：LAYOUT_RADIUS で独立制御（フォント・表示半径と無関係）
      const collideR = LAYOUT_RADIUS * OVERLAP_FACTOR;

      // シミュレーション開始前に目標座標を固定（d.x/d.y はシミュレーション中に書き換わるため）
      nodes.forEach(d => { d.tx = d.x; d.ty = d.y; });

      const sim = d3.forceSimulation(nodes)
        .force("x", d3.forceX(d => d.tx).strength(TARGET_STRENGTH))
        .force("y", d3.forceY(d => d.ty).strength(TARGET_STRENGTH))
        .force("collide", d3.forceCollide(collideR))
        .stop();

      for (let i = 0; i < 320; i++) sim.tick();
      node.attr("transform", d => `translate(${d.x},${d.y})`);

      // ホバー
      node.on("mouseenter", function(event, d) {
          d3.select(this).raise()
            .transition().duration(90)
            .attr("transform", `translate(${d.x},${d.y - HOVER_RISE_PX}) scale(${HOVER_SCALE})`);
        })
        .on("mouseleave", function(event, d) {
          d3.select(this)
            .transition().duration(90)
            .attr("transform", `translate(${d.x},${d.y}) scale(1)`);
        });

      // 初期倍率で必ず入りきる
      fitToView(root, zoom, nodes, W, H);
    }

    async function main() {
      try {
        const json = await loadData();
        draw(json);
        window.addEventListener("resize", () => draw(json), { passive: true });
      } catch (e) {
        console.error(e);
        showError(e?.message ?? String(e));
      }
    }

    main();
  </script>
</body>
</html>
